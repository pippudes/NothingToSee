<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 😎</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        max-width: 400px;
        width: 90%;
    }

    h1 {
        color: #ff4d88;
        margin-bottom: 10px;
    }

    p {
        color: #555;
        margin-bottom: 25px;
    }

    button {
        background: linear-gradient(45deg, #ff4d88, #ff80ab);
        border: none;
        padding: 12px 25px;
        font-size: 16px;
        color: white;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(255,77,136,0.5);
    }

    #text {
        margin-top: 25px;
        font-size: 20px;
        color: #333;
        min-height: 40px;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Hellooo Neesa</h1>
    <p>Click je… </p>

    <button onclick="showText()">Start</button>

    <div id="text"></div>
</div>

<script>
    const texts = [
        "hai neesa",
        "ni aku, Danial Hakim",
        "aku buat ni sebab bosan HAHAHA",
        "Actually... aku dah lama minat kau",
        "Kau cantik!! 👍",
        "aku malu nak tegur dalam kelas so...",
        "aku buat ni",
        "sebenarnya, aku dah lama minat kau",
        "baru harini berani nak bagitahu",
        "itu je, thankyou sebab baca sampai habis ❤️"
    ];

    let index = 0;

    function showText() {
        if (index < texts.length) {
            document.getElementById("text").innerText = texts[index];
            index++;
        }
    }
</script>

</body>
</html>
